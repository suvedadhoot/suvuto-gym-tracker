<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Workout Tracker</title>
<style>
:root{--bg:#0b0b0b;--panel:#171717;--panel2:#101010;--line:#282828;--text:#f2f2f2;--muted:#8f8f8f;--lime:#b9ff5f;--orange:#c77b3d;--blue:#4fb3d8;--red:#e36a6a;--purple:#b475e6;--green:#54d98b;--yellow:#d7d36b;--pink:#e75cc9;}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;line-height:1.25;padding:28px 14px 70px}.wrap{max-width:980px;margin:auto}.kicker{color:var(--lime);font-size:13px;font-weight:800;letter-spacing:.08em}.title{font-size:44px;letter-spacing:-.04em;font-weight:900;margin:12px 0}.title span{color:var(--lime);margin-left:18px}.meta{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);background:var(--panel);margin:12px 0 28px}.meta div{text-align:center;color:var(--muted);padding:13px;border-right:1px solid var(--line);font-size:14px}.meta div:last-child{border-right:0}hr{border:0;border-top:1px solid var(--line);margin:26px 0}h2{font-size:18px;color:var(--muted);margin:0 0 12px}.volume{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.vol{border:1px solid var(--line);background:linear-gradient(#151515,#0d0d0d);padding:12px 10px}.vol b{display:block;color:var(--muted);font-size:13px;text-transform:uppercase}.vol strong{display:block;font-size:32px;margin:6px 0 0}.vol small{color:var(--muted)}.tabs{position:sticky;top:0;z-index:4;background:rgba(11,11,11,.94);backdrop-filter:blur(10px);padding:10px 0;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.tabs button{background:#151515;color:var(--muted);border:1px solid var(--line);padding:12px 8px;border-radius:10px;font-weight:800}.tabs button.active{color:#111;background:var(--lime);border-color:var(--lime)}.day{display:none}.day.active{display:block}.dayhead{display:grid;grid-template-columns:1fr 160px;gap:14px;border:1px solid var(--line);background:var(--panel);padding:16px;margin:18px 0}.daynum{color:var(--lime);font-size:13px;font-weight:900}.dayname{font-size:28px;font-weight:900}.subtitle{color:var(--muted);font-size:17px}.setsbox{text-align:right;background:#0d0d0d;padding:8px 14px}.setsbox strong{display:block;color:var(--lime);font-size:42px}.setsbox small{color:var(--muted);display:block}.section-title{color:var(--orange);font-size:13px;font-weight:900;margin:18px 0 8px;text-transform:uppercase}.section-title.work{color:var(--lime)}.list{border:1px solid var(--line);background:var(--panel)}.item{display:grid;grid-template-columns:44px 1fr;gap:12px;padding:12px 12px;border-bottom:1px solid #222}.item:last-child{border-bottom:0}.bullet{color:var(--orange);font-weight:900;align-self:center;text-align:center}.exercise{display:grid;grid-template-columns:54px 1fr 172px;gap:12px;align-items:center;padding:10px 12px;border-bottom:1px solid #222}.exercise:last-child{border-bottom:0}.setnum{font-size:28px;font-weight:900;color:var(--lime);background:#0c0c0c;text-align:center;padding:6px}.name{font-size:18px;font-weight:900;background:#0b0b0b;padding:4px 0}.desc,.detail{color:var(--muted);font-size:14px}.tag{border:1px solid currentColor;text-align:center;padding:6px;font-size:12px;font-weight:900}.Glutes{color:#d78b4e}.Hamstrings{color:#e36a6a}.Quads{color:#b475e6}.Calves{color:#54d98b}.Core{color:#4fb3d8}.Chest{color:#e36a6a}.MidBack{color:#4fb3d8}.Lats{color:#4fb3d8}.Shoulders{color:#d7d36b}.RearDelts{color:#e75cc9}.Biceps{color:#6de0c5}.Triceps{color:#b9ff5f}.track{display:grid;grid-template-columns:1fr 1fr;gap:8px}.track label{color:var(--muted);font-size:11px;text-transform:uppercase;font-weight:800}.track input{width:100%;background:#050505;border:1px solid #333;color:var(--text);border-radius:7px;padding:10px;font-size:16px}.wide{grid-column:1/-1}.note{grid-column:1/-1}.principles{border:1px solid var(--line)}.principle{display:grid;grid-template-columns:185px 1fr;gap:16px;padding:12px 16px;border-bottom:1px solid #222}.principle:last-child{border-bottom:0}.principle b{color:var(--lime)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.actions button{background:#151515;color:var(--text);border:1px solid var(--line);border-radius:9px;padding:11px 12px;font-weight:800}.saved{color:var(--muted);font-size:13px;margin-left:auto;align-self:center}@media(max-width:760px){body{padding:18px 10px 60px}.title{font-size:34px}.title span{margin-left:8px}.meta{grid-template-columns:1fr 1fr}.volume{grid-template-columns:1fr 1fr}.dayhead{grid-template-columns:1fr 100px}.setsbox strong{font-size:34px}.exercise{grid-template-columns:44px 1fr}.exercise .tag{grid-column:2}.track{grid-column:1/-1}.tabs{gap:6px}.tabs button{font-size:12px;padding:10px 4px}.principle{grid-template-columns:1fr}.saved{margin-left:0}}
</style>
</head><body><div class="wrap">
<div class="kicker">SHANNON RITCHEY METHOD</div><div class="title">WORKOUT <span>PLAN</span></div>
<div class="meta"><div>4-Day Rotating Split</div><div>Mon / Wed / Fri</div><div>45 min Max</div><div>19/17/18/16 Sets</div></div>
<hr><h2>WEEKLY VOLUME</h2><div class="volume" id="volume"></div><hr>
<div class="tabs" id="tabs"></div><div class="actions"><button onclick="exportData()">Export backup</button><button onclick="importData()">Import backup</button><button onclick="resetData()">Reset saved weights</button><span class="saved" id="saved">Autosaves on edit</span></div>
<div id="days"></div><hr><h2>KEY PRINCIPLES</h2><div class="principles" id="principles"></div>
</div><script>
const volume=[['GLUTES','13+','sets x 2 days'],['HAMSTRINGS','6','sets x 2 days'],['QUADS','9','sets x 2 days'],['CALVES','6','sets x 2 days'],['LATS','5','sets x 2 days'],['MID-BACK','6','sets x 2 days'],['REAR DELTS','4','sets + indirect'],['SHOULDERS','5','sets x 2 days'],['CHEST','5','sets x 2 days'],['BICEPS','4','sets + indirect'],['TRICEPS','4','sets + indirect'],['CORE','6','lower days only']];
const principles=[['REP RANGE','1-4 reps from failure, within 6-30 reps. Last rep must feel genuinely hard.'],['REST PERIODS','~2 min for compound sets · ~90 sec for isolation sets'],['ROTATION','Mon > Wed > Fri > Mon (8-day cycle). Each muscle group hit every 4-5 days.'],['PROGRESSION','Increase weight or reps each session. If you can hit 30 reps, go heavier.'],['STRETCHING','5-7 min post-workout. Hold each stretch 30-60 seconds.'],['CARDIO','150 min/week moderate intensity on rest days. 1x HIIT <15 min optional.']];
const days=[
{day:'DAY 01',name:'LOWER A',sub:'Glute + Hamstring',sets:19,time:'~46 min',warm:[['Bodyweight Glute Bridge','15 reps - activates glutes before hip thrusts'],['Leg Swings Front to Back','10 each leg - hip flexor and hamstring mobility'],['Side-Lying Hip Abduction','12 each side - bodyweight, activates glute med'],['Hip Circle Rotations','10 each direction'],['Light Hip Thrust','10 reps at 40-50% working weight']],work:[['4','Hip Thrust','Barbell or Smith machine','Glutes'],['3','Romanian Deadlift','Barbell or dumbbells','Hamstrings / Glutes'],['3','Leg Extension','Leg extension machine','Quads'],['3','Cable Hip Abduction','Cable machine, ankle attachment','Glutes'],['3','Calf Raise','Standing or seated calf raise machine','Calves'],['3','Dead Bug','Bodyweight, floor','Core']],stretch:[['Pigeon Pose','Glutes / hip external rotators'],['Standing Forward Fold','Hamstrings'],['Figure Four Stretch','Glutes / piriformis'],['Kneeling Quad Stretch','Quads'],['Standing Calf Stretch','Calves - against wall'],['Supine Knees-to-Chest','Lower back decompression']]},
{day:'DAY 02',name:'UPPER A',sub:'Push + Pull',sets:17,time:'~42 min',warm:[['Arm Circles','15 each direction - forward and back'],['Bent-Over Rear Delt Fly','15 reps - very light or no weight'],['Shoulder Internal/External Rotation','10 each - light dumbbell'],['Cat-Cow','10 reps - thoracic spine mobility'],['Light Lat Pulldown','10 reps at 40-50% working weight']],work:[['3','Incline Dumbbell Press','Incline bench, dumbbells','Chest'],['3','Seated Row','Seated row machine','Mid-Back'],['3','Lat Pulldown','Lat pulldown machine','Lats'],['2','Dumbbell Lateral Raise','Dumbbells','Shoulders'],['2','Rear Delt Fly','Dumbbells or cable machine','Rear Delts'],['2','Standing Bicep Curl','Dumbbells or barbell','Biceps'],['2','Overhead Tricep Extension','Cable machine or dumbbell','Triceps']],stretch:[['Cross-Body Shoulder Stretch','Rear delts / shoulders'],['Doorway Chest Stretch','Chest / front delts'],['Overhead Tricep Stretch','Triceps'],['Supinated Wrist Stretch','Forearms / biceps'],["Child's Pose with Side Reach",'Lats']]},
{day:'DAY 03',name:'LOWER B',sub:'Glute + Quad + Hamstring',sets:18,time:'~44 min',warm:[['Bodyweight Sumo Squat','15 reps - wide stance, activates glutes and inner thighs'],['Hip Flexor Stretch in Motion','10 each side - opens hips before deep squatting'],['Lateral Squat','15 each direction - slow tempo, warms up adductors'],['Bodyweight Glute Bridge','15 reps - activates glutes before kickbacks'],['Light Leg Press','10 reps at 40-50% working weight']],work:[['3','Elevated Sumo Squat','Single dumbbell goblet-style, standing on weight plates','Glutes / Quads'],['3','Seated Leg Curl','Leg curl machine','Hamstrings'],['3','Leg Press','Leg press machine','Quads / Glutes'],['3','Cable Kickback','Cable machine, ankle attachment','Glutes'],['3','Calf Raise','Standing or seated calf raise machine','Calves'],['2','Lying Leg Raises','Bodyweight, floor','Core'],['1','Side Plank','Bodyweight - 1 set each side','Core']],stretch:[['Wide-Stance Hip Flexor Stretch','Hip flexors / inner thighs - after sumo squats'],['Standing Forward Fold','Hamstrings - after leg curl'],['Pigeon Pose','Glutes / piriformis'],['Seated Figure Four','Glutes'],['Downward Dog','Calves / hamstrings']]},
{day:'DAY 04',name:'UPPER B',sub:'Push + Pull',sets:16,time:'~40 min',warm:[['Doorway Chest Opener','30 seconds each side'],['Bent-Over Rear Delt Fly','15 reps - very light or no weight'],['Scapular Wall Slides','10 reps - activates mid and upper back'],['Shoulder 90/90 Rotation','10 each side'],['Light Dumbbell Shoulder Press','10 reps at 40-50% working weight']],work:[['3','Dumbbell Shoulder Press','Dumbbells','Shoulders'],['2','Pec Deck Machine','Pec deck / chest fly / butterfly machine','Chest'],['3','Single-Arm Dumbbell Row','Dumbbell, bench for support','Mid-Back'],['2','Straight Arm Pulldown','Cable machine, straight bar or rope','Lats'],['2','Face Pull','Cable machine, rope attachment at head height','Rear Delts'],['2','Hammer Curl','Dumbbells','Biceps'],['2','Tricep Pushdown','Cable machine, rope or straight bar','Triceps']],stretch:[['Doorway Chest Stretch','Chest'],['Lat Stretch','Lats - arm overhead, lean to side'],['Neck Side Stretch','Traps / neck'],['Overhead Tricep Stretch','Triceps'],['Supinated Wrist Stretch','Biceps / forearms']]}
];
const key='sr-workout-tracker-v1'; let saved=JSON.parse(localStorage.getItem(key)||'{}'); const clean=s=>s.replace(/[^a-zA-Z]/g,'');
function save(){localStorage.setItem(key,JSON.stringify(saved));document.getElementById('saved').textContent='Saved '+new Date().toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});} 
function makeList(arr, bullet){return `<div class="list">${arr.map(x=>`<div class="item"><div class="bullet">${bullet}</div><div><div class="name">${x[0]}</div><div class="detail">${x[1]}</div></div></div>`).join('')}</div>`}
function makeWork(dayIndex, arr){return `<div class="list">${arr.map((x,i)=>{const id=`d${dayIndex}-${i}`; saved[id]??={weight:'',reps:'',notes:''}; return `<div class="exercise"><div class="setnum">${x[0]}</div><div><div class="name">${x[1]}</div><div class="desc">${x[2]}</div></div><div class="tag ${clean(x[3])}">${x[3]}</div><div class="track"><div><label>Weight</label><input inputmode="decimal" placeholder="lbs" value="${saved[id].weight}" oninput="saved['${id}'].weight=this.value;save()"></div><div><label>Reps</label><input inputmode="numeric" placeholder="reps" value="${saved[id].reps}" oninput="saved['${id}'].reps=this.value;save()"></div><div class="note"><label>Notes</label><input placeholder="seat, form cue, etc." value="${saved[id].notes}" oninput="saved['${id}'].notes=this.value;save()"></div></div></div>`}).join('')}</div>`}
function render(){document.getElementById('volume').innerHTML=volume.map(v=>`<div class="vol"><b>${v[0]}</b><strong>${v[1]}</strong><small>${v[2]}</small></div>`).join('');document.getElementById('principles').innerHTML=principles.map(p=>`<div class="principle"><b>${p[0]}</b><span>${p[1]}</span></div>`).join('');document.getElementById('tabs').innerHTML=days.map((d,i)=>`<button onclick="show(${i})" id="tab${i}">${d.name}</button>`).join('');document.getElementById('days').innerHTML=days.map((d,i)=>`<section class="day" id="day${i}"><div class="dayhead"><div><div class="daynum">${d.day}</div><div class="dayname">${d.name}</div><div class="subtitle">${d.sub}</div></div><div class="setsbox"><strong>${d.sets}</strong><small>SETS</small><small>${d.time}</small></div></div><div class="section-title">WARM-UP - 5-7 MIN</div>${makeList(d.warm,'>')}<div class="section-title work">WORKOUT - ${d.sets} SETS</div>${makeWork(i,d.work)}<div class="section-title">POST-WORKOUT STRETCHES - Hold 30-60 sec each</div>${makeList(d.stretch,'·')}</section>`).join('');show(0)}
function show(i){document.querySelectorAll('.day,.tabs button').forEach(e=>e.classList.remove('active'));document.getElementById('day'+i).classList.add('active');document.getElementById('tab'+i).classList.add('active')}
function exportData(){const blob=new Blob([JSON.stringify(saved,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='gym-weights-backup.json';a.click()}
function importData(){const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{saved=JSON.parse(r.result);save();render()};r.readAsText(f)};inp.click()}
function resetData(){if(confirm('Clear all saved weights, reps, and notes?')){saved={};save();render()}}
render();
</script></body></html>
